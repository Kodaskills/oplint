<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Refined, denser gradient -->
    <linearGradient id="bgGradient" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#2A0E5C" />
      <stop offset="30%" stop-color="#4C1D95" />
      <stop offset="55%" stop-color="#5B21B6" />
      <stop offset="80%" stop-color="#6D28D9" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <!-- Much softer highlight -->
    <radialGradient id="highlight" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bgGradient)" />
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#highlight)" />
  <!-- Shield -->
  <path d="M64 36
                       L88 44
                       V64
                       C88 78 76 88 64 92
                       C52 88 40 78 40 64
                       V44
                       Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round" />
  <!-- Checkmark -->
  <path d="M52 64 L62 74 L78 56" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
