name: 🐛 Bug Report
description: Create a report to help us improve
title: 'fix: '
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14.2, Windows 11, Ubuntu 22.04
    validations:
      required: true

  - type: input
    id: oplint-version
    attributes:
      label: oplint Version
      placeholder: e.g., 0.18
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Run `rustc --version`
      placeholder: e.g., rustc 1.78.0
    validations:
      required: false

  - type: textarea
    id: code-example
    attributes:
      label: Code Example
      description: Minimal code snippet or example that reproduces the issue.
      render: rust
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or possible solution here.
    validations:
      required: false
