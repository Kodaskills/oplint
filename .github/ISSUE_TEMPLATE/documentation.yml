name: 📚 Documentation Improvement
description: Suggest improvements to documentation
title: 'docs: '
labels: ["documentation"]
body:
  - type: input
    id: documentation-area
    attributes:
      label: Documentation Area
      description: Which part of the documentation needs improvement?
      placeholder: e.g., README, API docs, examples, CONTRIBUTING
    validations:
      required: true

  - type: textarea
    id: current-state
    attributes:
      label: Current State
      description: Describe what's unclear, missing, or incorrect.
    validations:
      required: true

  - type: textarea
    id: proposed-improvement
    attributes:
      label: Proposed Improvement
      description: Describe how the documentation should be improved.
    validations:
      required: true

  - type: textarea
    id: why-it-matters
    attributes:
      label: Why This Matters
      description: Explain why this improvement would help users.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples.
    validations:
      required: false
